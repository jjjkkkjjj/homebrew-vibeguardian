name: Update Formula

# Triggered by `repository_dispatch` from the main vibesafer release CI.
# Payload: { "version": "v0.2.0" }
on:
  repository_dispatch:
    types: [release]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Fetch release assets and rewrite formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          VERSION_NUM="${VERSION#v}"
          BASE="https://github.com/jjjkkkjjj/vibesafer/releases/download/${VERSION}"

          curl -fsSL "${BASE}/vs-aarch64-apple-darwin.tar.gz"    -o arm.tar.gz
          curl -fsSL "${BASE}/vs-x86_64-apple-darwin.tar.gz"     -o intel.tar.gz
          curl -fsSL "${BASE}/vs-x86_64-unknown-linux-gnu.tar.gz" -o linux.tar.gz

          SHA_ARM=$(sha256sum   arm.tar.gz   | awk '{print $1}')
          SHA_INTEL=$(sha256sum intel.tar.gz  | awk '{print $1}')
          SHA_LINUX=$(sha256sum linux.tar.gz  | awk '{print $1}')

          python3 - "$VERSION_NUM" "$SHA_ARM" "$SHA_INTEL" "$SHA_LINUX" <<'PYEOF'
          import sys, re

          version, sha_arm, sha_intel, sha_linux = sys.argv[1:]

          with open("Formula/vibesafer.rb") as f:
              lines = f.readlines()

          result = []
          for i, line in enumerate(lines):
              # update version field
              if re.match(r'\s*version\s+"[^"]*"', line):
                  line = re.sub(r'"[^"]*"', f'"{version}"', line)
              # update sha256 — identify by the preceding url line
              elif re.match(r'\s*sha256\s+"[^"]*"', line) and i > 0:
                  prev = lines[i - 1]
                  if "aarch64-apple-darwin" in prev:
                      line = re.sub(r'"[^"]*"', f'"{sha_arm}"', line)
                  elif "x86_64-apple-darwin" in prev:
                      line = re.sub(r'"[^"]*"', f'"{sha_intel}"', line)
                  elif "x86_64-unknown-linux-gnu" in prev:
                      line = re.sub(r'"[^"]*"', f'"{sha_linux}"', line)
              result.append(line)

          with open("Formula/vibesafer.rb", "w") as f:
              f.writelines(result)

          print(f"Updated formula to {version}")
          PYEOF

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vibesafer.rb
          git commit -m "chore: update vibesafer to ${VERSION}"
          git push
